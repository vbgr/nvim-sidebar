name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Stylua and Docker tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Lua formatting
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            johnnymorganz/stylua:2.4.1 \
            /stylua --check lua tests

      - name: Build test image
        run: docker build -t nvim-sidebar-test .

      - name: Run tests in Docker
        run: docker run --rm nvim-sidebar-test
